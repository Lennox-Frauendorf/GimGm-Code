<div id="ide-container" style="display: none;">
        
        <div class="mobile-header">
            <i class="fas fa-bars" onclick="toggleSidebar()"></i>
            <span>GimGm AI</span>
            <div style="display:flex; gap: 15px;">
                <i class="fas fa-robot" onclick="toggleAI()" style="color: #007acc;"></i>
                <i class="fas fa-play" onclick="runCode()"></i>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-title">
                <span>PROJEKTE</span>
                <i class="fas fa-plus" onclick="openNewProjectModal()" title="Neu" style="cursor: pointer;"></i>
            </div>
            <div id="project-list" class="file-tree"></div>

            <div class="sidebar-title" style="margin-top: 20px;">
                DATEIEN
                <div style="display:flex; gap:10px;">
                    <i class="fas fa-folder-open" onclick="triggerFileUpload()" title="Dateien öffnen" style="cursor: pointer;"></i>
                    <i class="fas fa-download" onclick="downloadActiveFile()" title="Download" style="cursor: pointer;"></i>
                </div>
            </div>
            <input type="file" id="file-upload-input" style="display: none;" multiple>
            
            <div id="file-list" class="file-tree"></div>

            <div class="sidebar-bottom">
                <button onclick="toggleAI()" class="btn-ai"><i class="fas fa-robot"></i> AI Hilfe</button>
                <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="editor-area">
            <div class="editor-tabs" id="editor-tabs"></div>
            <div class="code-wrapper" id="code-wrapper">
                <div class="line-numbers" id="line-numbers">1</div>
                <div class="code-container" id="code-container">
                    <div id="autocomplete-box" class="autocomplete-box" style="display: none;"></div>
                </div>
            </div>
        </div>

        <div id="ai-panel" class="ai-panel">
            <div class="ai-header">
                <span><i class="fas fa-robot"></i> GimGm Bot</span>
                <i class="fas fa-times" onclick="toggleAI()" style="cursor:pointer;"></i>
            </div>
            <div class="ai-content" id="ai-chat">
                <div class="ai-msg bot">Hallo! Ich bin dein Code-Assistent. Ich suche nach Fehlern...</div>
            </div>
            <div class="ai-actions">
                <button onclick="runAICheck()" class="btn-create" style="width:100%">Code Analysieren</button>
            </div>
        </div>

        <div class="preview-area" id="preview-area">
            <div class="preview-header" id="preview-header">
                <div class="drag-handle"><i class="fas fa-grip-vertical"></i> LIVE VORSCHAU</div>
                <div class="preview-controls">
                    <i class="fas fa-sync-alt" onclick="runCode()" title="Reload"></i>
                    <i class="fas fa-expand" onclick="toggleFullscreen()" title="Vollbild"></i>
                    <i class="fas fa-window-minimize" onclick="minimizePreview()" title="Minimieren/Maximieren"></i>
                </div>
            </div>
            <div class="preview-content">
                <iframe id="preview-frame"></iframe>
            </div>
        </div>
    </div>
